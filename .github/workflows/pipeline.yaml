name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devsecops-api
  CONTAINER_PORT: 5000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-pipeline-secure
  GCP_REGION: me-west1
  GCP_GAR_REPOSITORY: devsecops-pipeline-secure 

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  security-events: write
  issues: write

jobs:
  # ── 1. Security Gates ─────────────────────────────────────────────────────
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]==1.9.4
      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 2. Build & Push (Multi-Cloud) ───────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan]
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
      GCP_WORKLOAD_IDENTITY_POOL: ${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build and export image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

      # --- AWS ECR PUSH ---
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- GCP ARTIFACT REGISTRY PUSH (WIF) ---
      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_WORKLOAD_IDENTITY_POOL }}/providers/github-provider
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Runtime & IaC Scans ──────────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load -i /tmp/image.tar
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-results.sarif }

  iac-scan:
    name: IaC Scan — Checkov
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  dast:
    name: DAST — OWASP ZAP
    needs: [container-scan, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load -i /tmp/image.tar
      - name: Start staging app
        run: |
          docker run -d --name staging-app -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:${{ env.CONTAINER_PORT }}
          rules_file_name: .zap/rules.tsv
          cmd_options: -I
      - name: Cleanup
        if: always()
        run: docker rm -f staging-app || true

  # ── 4. GitOps Deployments ───────────────────────────────────────────────────
  deploy-pi:
    name: Deploy to Pi (GitOps)
    runs-on: ubuntu-latest
    needs: [dast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          ref: main
          fetch-depth: 0
      - name: Update Pi Tag
        run: |
          git pull --rebase origin main
          PATCH=gitops/manifests/flask-app/overlays/pi/patch-image.yaml
          ECR_URL="393818036545.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $ECR_URL:sha-${{ github.sha }}|" "$PATCH"
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "$PATCH"
          git commit -m "chore(gitops): deploy sha-${{ github.sha }} to pi [skip ci]" || exit 0
          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "git push failed; rebasing and retrying ($i/3)..."
            git pull --rebase origin main
          done
          exit 1

  deploy-gke:
    name: Deploy to GKE (GitOps)
    runs-on: ubuntu-latest
    needs: [deploy-pi]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          ref: main
          fetch-depth: 0
      - name: Update GKE Tag
        run: |
          if [[ -z "${{ secrets.GCP_PROJECT_ID }}" ]]; then
            echo "GCP_PROJECT_ID secret not set; skipping GKE GitOps deploy."
            exit 0
          fi
          git pull --rebase origin main
          PATCH=gitops/manifests/flask-app/overlays/gke/patch-image.yaml
          GAR_URL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $GAR_URL:sha-${{ github.sha }}|" "$PATCH"
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "$PATCH"
          git commit -m "chore(gitops): deploy sha-${{ github.sha }} to gke [skip ci]" || exit 0
          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "git push failed; rebasing and retrying ($i/3)..."
            git pull --rebase origin main
          done
          exit 1