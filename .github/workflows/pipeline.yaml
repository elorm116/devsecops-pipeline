name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: devsecops-api
  CONTAINER_PORT: 5000

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ── Fast Security Gates ─────────────────────────────────────
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]==1.9.4
      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── Build Once (export as artifact so later jobs can use it) ─
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (export)
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  # ── Container & IaC Scanning ───────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/image.tar
      - name: Scan image (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  iac-scan:
    name: IaC Scan — Checkov
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Checkov
        run: pip install checkov==3.2.517
      - name: Run Checkov
        run: checkov -d terraform/ --framework terraform --soft-fail

  # ── DAST on local "staging" container ─────────────────────
  dast:
    name: DAST — OWASP ZAP
    needs: [container-scan, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/image.tar
      - name: Start staging container
        run: |
          docker run -d --name staging-app \
            -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:${{ env.CONTAINER_PORT }}/health" >/dev/null; then
              echo "App is healthy."
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "App did not become healthy in time."
          exit 1
      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:${{ env.CONTAINER_PORT }}
          rules_file_name: .zap/rules.tsv
          cmd_options: -I
      - name: Stop container
        if: always()
        run: docker rm -f staging-app || true