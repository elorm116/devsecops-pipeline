name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devsecops-api
  CONTAINER_PORT: 5000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  # ── Fast Security Gates ─────────────────────────────────────
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]==1.9.4
      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── Build Docker Image Once ─────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build and Export Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

      # Optional: push the exact same image to ECR (does not affect the artifact used by later jobs)
      - name: Load Docker Image
        run: docker load -i /tmp/image.tar

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2.1.2

      - name: Tag and Push Image to ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}  
        run: |
          set -euo pipefail

          LOCAL_IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          ECR_IMAGE_SHA="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ github.sha }}"
          ECR_IMAGE_LATEST="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Tagging and pushing images..."
          docker tag "${LOCAL_IMAGE}" "${ECR_IMAGE_SHA}"
          docker tag "${LOCAL_IMAGE}" "${ECR_IMAGE_LATEST}"

          docker push "${ECR_IMAGE_SHA}"
          docker push "${ECR_IMAGE_LATEST}"

          echo "✅ Successfully pushed to ECR:"
          echo "   - ${ECR_IMAGE_SHA}"
          echo "   - ${ECR_IMAGE_LATEST}"

  # ── Container Scan ──────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load Docker Image
        run: docker load -i /tmp/image.tar
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  # ── IaC Scan ────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  # ── DAST ────────────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP
    needs: [container-scan, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load Docker Image
        run: docker load -i /tmp/image.tar
      - name: Start Staging Container
        run: |
          docker run -d --name staging-app \
            -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Wait for Application
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:${{ env.CONTAINER_PORT }}/health" >/dev/null 2>&1; then
              echo "App is healthy."
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "App failed to become healthy."
          exit 1
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:${{ env.CONTAINER_PORT }}
          rules_file_name: .zap/rules.tsv
          cmd_options: -I
      - name: Stop Container
        if: always()
        run: docker rm -f staging-app || true