name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devsecops-api
  CONTAINER_PORT: 5000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-pipeline-secure
  GCP_REGION: me-west1
  GCP_GAR_REPOSITORY: devsecops-pipeline-secure

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  security-events: write
  issues: write

jobs:
  # ── 1. Security Gates ─────────────────────────────────────────────────────
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]==1.9.4
      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 2. Build, Push & SBOM ─────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan]
    # ── Expose digests so the deploy job can use immutable references ────────
    outputs:
      ecr-digest: ${{ steps.build-ecr.outputs.digest }}
      gar-digest: ${{ steps.build-gar.outputs.digest }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
      GCP_WORKLOAD_IDENTITY_POOL: ${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      # Build locally for scanning — no push, amd64 only for speed
      - name: Build and export image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image into Docker daemon
        run: docker load -i /tmp/image.tar

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

      # --- SBOM GENERATION ---
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./app.sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: final-sbom
          path: ./app.sbom.json

      # --- AWS ECR PUSH ---
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # id: build-ecr — digest captured via outputs.ecr-digest
      - name: Build and push to ECR
        if: github.ref == 'refs/heads/main'
        id: build-ecr
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- GCP ARTIFACT REGISTRY PUSH (WIF) ---
      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_WORKLOAD_IDENTITY_POOL }}/providers/github-provider
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # id: build-gar — digest captured via outputs.gar-digest
      - name: Build and push to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        id: build-gar
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- COSIGN SIGNING (by digest, not tag) ---
      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign the images
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          # Sign by digest — immutable and what Kyverno actually verifies
          ECR_REF: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build-ecr.outputs.digest }}
          GAR_REF: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ steps.build-gar.outputs.digest }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key

          echo "Signing AWS ECR image by digest..."
          cosign sign --key cosign.key $ECR_REF

          if [ "${{ secrets.GCP_PROJECT_ID }}" != "" ]; then
            echo "Signing GCP GAR image by digest..."
            cosign sign --key cosign.key $GAR_REF
          fi

          rm -f cosign.key

  # ── 3. Runtime & IaC Scans ────────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }

      - name: Load image into Docker
        run: docker load -i /tmp/image.tar

      # Step A: Detailed scan for GitHub Security tab
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      # Step B: Security gate — fails the build if unfixable criticals are found
      - name: Enforcement - Fail on Criticals
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-results.sarif }

      # --- Slack Notifications ---
      - name: Send Slack Success Notification
        if: success()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#36a64f",
                "title": "✅ Security Gate: Container Scan Passed",
                "text": "All security checks passed for *${{ env.IMAGE_NAME }}*.\nDeployment to Pi 5 is proceeding.",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true },
                  { "title": "Image", "value": "${{ env.IMAGE_NAME }}:${{ github.sha }}", "short": true }
                ]
              }]
            }

      - name: Send Slack Failure Notification
        if: failure()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#ff0000",
                "title": "🚫 Security Gate: Container Scan Failed",
                "text": "CRITICAL vulnerabilities detected in *${{ env.IMAGE_NAME }}*.\nDeployment to Pi 5 has been halted for triage.",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true },
                  { "title": "Image", "value": "${{ env.IMAGE_NAME }}:${{ github.sha }}", "short": true }
                ]
              }]
            }

  iac-scan:
    name: IaC Scan — Checkov
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  dast:
    name: DAST — OWASP ZAP
    needs: [container-scan, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }
      - run: docker load -i /tmp/image.tar
      - name: Start staging app
        run: |
          docker run -d --name staging-app -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:${{ env.CONTAINER_PORT }}
          rules_file_name: .zap/rules.tsv
          cmd_options: -I
      - name: Cleanup
        if: always()
        run: docker rm -f staging-app || true

  # ── 4. Unified GitOps Deployment ──────────────────────────────────────────
  deploy:
    name: Sync GitOps Manifests
    runs-on: ubuntu-latest
    needs: [dast, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          ref: main
          fetch-depth: 0

      - name: Update Both Overlays
        run: |
          git pull --rebase origin main

          # ── Pi overlay (AWS ECR) — immutable digest reference ──────────────
          PATCH_PI=gitops/manifests/flask-app/overlays/pi/patch-image.yaml
          ECR_URL="393818036545.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          ECR_DIGEST="${{ needs.build.outputs.ecr-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $ECR_URL@$ECR_DIGEST|" "$PATCH_PI"

          # ── GKE overlay (GCP GAR) — immutable digest reference ─────────────
          PATCH_GKE=gitops/manifests/flask-app/overlays/gke/patch-image.yaml
          GAR_URL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          GAR_DIGEST="${{ needs.build.outputs.gar-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $GAR_URL@$GAR_DIGEST|" "$PATCH_GKE"

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "$PATCH_PI" "$PATCH_GKE"

          git commit -m "chore(gitops): deploy sha-${{ github.sha }} to all clusters [skip ci]" || exit 0

          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "git push failed; rebasing and retrying ($i/3)..."
            git pull --rebase origin main
          done
          exit 1
          