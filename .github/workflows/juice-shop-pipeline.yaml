name: Juice Shop DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devsecops-api
  CONTAINER_PORT: 5000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-pipeline-secure
  JUICE_SHOP_ECR_REPOSITORY: juice-shop
  GCP_REGION: me-west1
  GCP_GAR_REPOSITORY: devsecops-pipeline-secure

# Cancel in-progress runs on the same branch when a new push arrives.
# Prevents redundant builds queuing up on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write       # Required for OIDC federation to AWS and GCP
  security-events: write
  issues: write

jobs:
  # ── 0. Detect Changed Paths ───────────────────────────────────────────────
  # Runs on every push. Outputs control which downstream jobs run.
  # Key insight: ArgoCD handles GitOps/config changes automatically.
  # The pipeline only needs to build+deploy when application CODE changes.
  # This prevents a Kyverno policy edit from triggering a 20min image build.
  #
  # Three outputs:
  #   flask: app/** or Dockerfile changed
  #   juice: juice-shop/** changed
  #   app:   either flask or juice changed (gates the build job)
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      flask: ${{ steps.filter.outputs.flask }}
      juice: ${{ steps.filter.outputs.juice }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flask:
              - 'app/**'
              - 'Dockerfile'
            juice:
              - 'juice-shop/**'
            app:
              - 'app/**'
              - 'Dockerfile'
              - 'juice-shop/**'

  # ── 1. SAST — Bandit ──────────────────────────────────────────────────────
  # Only runs when application code changes — no point scanning Python
  # when only a Terraform file or Kyverno policy was edited.
  #
  # Two-pass approach:
  #   Pass 1: Report all medium+ findings as artifact (never blocks)
  #   Pass 2: Hard enforcement — blocks pipeline on HIGH/CRITICAL only
  #
  # To suppress a legitimate finding: use # nosec B603 inline with justification.
  # Never add || true or --exit-zero to Pass 2.
  sast:
    name: SAST — Bandit
    needs: [detect-changes]
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install bandit[toml]==1.9.4

      # Pass 1: visibility only — exit-zero intentional here
      - name: Bandit — Full Report (medium+)
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --exit-zero

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      # Pass 2: enforcement — no exit-zero, no || true
      # If this fails: fix the code or add # nosec with justification
      - name: Bandit — Enforcement Gate (high/critical)
        run: |
          bandit -r app/ \
            --severity-level high \
            --confidence-level medium \
            --format txt

  # ── 2. Secrets Scan — Trivy ───────────────────────────────────────────────
  # Runs on every push regardless of what changed.
  # Secrets can be accidentally added to any file — Terraform, manifests, scripts.
  # This is the one gate that never gets path-filtered.
  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 3. Build & Push ───────────────────────────────────────────────────────
  # Only runs when application code changes (gated by detect-changes.app output).
  # Config-only changes (Kyverno, Terraform, values.yaml) skip this entirely —
  # ArgoCD picks those up directly from git without a new image being needed.
  #
  # On PRs: builds locally for scanning, never pushes to ECR/GAR.
  # On main: pushes to ECR (OIDC, no static keys) and GAR (OIDC).
  # OIDC trust policy binds to this repo + main branch — forks cannot assume role.
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan, detect-changes]
    # Skip if no app code changed — saves 10-20min on config-only pushes
    if: needs.detect-changes.outputs.app == 'true'
    outputs:
      ecr-digest: ${{ steps.build-ecr.outputs.digest }}
      gar-digest: ${{ steps.build-gar.outputs.digest }}
      juice-shop-digest: ${{ steps.build-juice-shop.outputs.digest }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
      GCP_WORKLOAD_IDENTITY_POOL: ${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # ── Local builds for scanning (amd64 only, no push) ──────────────────
      # Multi-arch push happens later after scans pass.
      # Building locally avoids needing registry credentials just to scan.
      - name: Build and export Flask image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load Flask image
        run: docker load -i /tmp/image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar

      - name: Build and export Juice Shop image
        uses: docker/build-push-action@v7
        with:
          context: ./juice-shop
          platforms: linux/amd64
          tags: ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/juice-shop.tar

      - name: Load Juice Shop image
        run: docker load -i /tmp/juice-shop.tar

      - uses: actions/upload-artifact@v7
        with:
          name: juice-shop-image
          path: /tmp/juice-shop.tar

      # ── SBOMs — generated before registry push ────────────────────────────
      # SBOM is of the built artifact, not dependent on registry availability.
      - name: Generate Flask SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./app.sbom.json

      - uses: actions/upload-artifact@v7
        with:
          name: final-sbom
          path: ./app.sbom.json

      - name: Generate Juice Shop SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./juice-shop.sbom.json

      - uses: actions/upload-artifact@v7
        with:
          name: juice-shop-sbom
          path: ./juice-shop.sbom.json

      # ── AWS OIDC — replaces static AWS_ACCESS_KEY_ID/SECRET ──────────────
      # GitHub requests JWT from its OIDC endpoint.
      # AWS STS validates JWT and issues temporary credentials (~1hr).
      # Role is scoped to ECR push on two specific repos — nothing else.
      # role-session-name makes CloudTrail logs traceable per pipeline run.
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── ECR push — multi-arch (amd64 for CI runner, arm64 for Pi) ────────
      - name: Build and push Flask to ECR
        if: github.ref == 'refs/heads/main'
        id: build-ecr
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Juice Shop to ECR
        if: github.ref == 'refs/heads/main'
        id: build-juice-shop
        uses: docker/build-push-action@v7
        with:
          context: ./juice-shop
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GCP OIDC — Workload Identity Federation (no static keys) ─────────
      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_WORKLOAD_IDENTITY_POOL }}/providers/github-provider
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Flask to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        id: build-gar
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Cosign — sign by digest, not tag ──────────────────────────────────
      # Tags are mutable — :latest can point to a different image tomorrow.
      # Digests are immutable SHA256 of the manifest — what Kyverno verifies.
      # Key written to disk only for signing duration, deleted immediately after.
      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign all images by digest
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          ECR_REF: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build-ecr.outputs.digest }}
          GAR_REF: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ steps.build-gar.outputs.digest }}
          JUICE_REF: ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}@${{ steps.build-juice-shop.outputs.digest }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          chmod 600 cosign.key
          cosign sign --key cosign.key "$ECR_REF"
          if [ -n "${{ secrets.GCP_PROJECT_ID }}" ]; then
            cosign sign --key cosign.key "$GAR_REF"
          fi
          cosign sign --key cosign.key "$JUICE_REF"
          rm -f cosign.key

  # ── 4. Container Scan — Flask ─────────────────────────────────────────────
  # Only runs if build succeeded (which only happens on app code changes).
  # Two-pass Trivy mirrors the Bandit pattern:
  #   Pass 1: SARIF → GitHub Security tab (full visibility)
  #   Pass 2: Hard fail on fixable CRITICALs only
  # ignore-unfixed: true — blocking on unfixed vulns punishes you for upstream
  # maintainers not releasing patches. Unfixed still appear in SARIF.
  container-scan:
    name: Container Scan — Trivy (Flask)
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: { name: docker-image, path: /tmp }

      - name: Load Flask image
        run: docker load -i /tmp/image.tar

      - name: Trivy — Full Report (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Trivy — Enforcement Gate (fixable CRITICALs only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: flask-app

      - name: Slack — Container Scan Passed
        if: success()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#36a64f",
                "title": "✅ Security Gate: Container Scan Passed",
                "text": "All security checks passed for *${{ env.IMAGE_NAME }}*.",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true }
                ]
              }]
            }

      - name: Slack — Container Scan Failed
        if: failure()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#ff0000",
                "title": "🚫 Security Gate: Container Scan Failed",
                "text": "CRITICAL vulnerabilities detected in *${{ env.IMAGE_NAME }}*. Deployment halted.",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true }
                ]
              }]
            }

  # ── 5. Container Scan — Juice Shop ───────────────────────────────────────
  # Report only — Juice Shop is deliberately vulnerable, always has CRITICALs.
  # Enforcement here would permanently break the pipeline for known accepted risk.
  # Findings still surface in GitHub Security tab under "juice-shop" category.
  juice-shop-scan:
    name: Container Scan — Trivy (Juice Shop)
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: { name: juice-shop-image, path: /tmp }

      - name: Load Juice Shop image
        run: docker load -i /tmp/juice-shop.tar

      - name: Trivy — Juice Shop Report (SARIF, no enforcement)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          format: sarif
          output: trivy-juice-shop.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-juice-shop.sarif
          category: juice-shop

  # ── 6. IaC Scan — Checkov ────────────────────────────────────────────────
  # Runs on every push — Terraform can change independently of app code.
  # No dependency on build — a config-only push still needs IaC scanning.
  # soft_fail removed — this gate now enforces.
  # Accepted findings use inline checkov:skip=CKV_ID:justification in .tf files.
  # Do not add soft_fail back. If a check fails: fix it or skip+justify it.
  iac-scan:
    name: IaC Scan — Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli

  # ── 7. DAST — Flask ───────────────────────────────────────────────────────
  # Only runs when Flask code changes AND container scan passed.
  # Skipped on Terraform, manifest, Juice Shop only changes.
  # -I flag removed: ZAP enforces via rules.tsv.
  # To accept a finding: add WARN or IGNORE to .zap/rules.tsv with comment.
  dast-flask:
    name: DAST — ZAP (Flask)
    needs: [container-scan, detect-changes]
    if: |
      needs.container-scan.result == 'success' &&
      needs.detect-changes.outputs.flask == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with: { name: docker-image, path: /tmp }

      - name: Load Flask image
        run: docker load -i /tmp/image.tar

      - name: Start Flask staging app
        run: |
          docker run -d --name staging-app \
            -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          for i in $(seq 1 10); do
            curl -sf http://localhost:${{ env.CONTAINER_PORT }}/health && break
            echo "Waiting for app... ($i/10)"
            sleep 3
          done

      - name: ZAP Baseline Scan — Flask
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:${{ env.CONTAINER_PORT }}
          rules_file_name: .zap/rules.tsv

      - name: Cleanup
        if: always()
        run: docker rm -f staging-app || true

  # ── 8. DAST — Juice Shop ──────────────────────────────────────────────────
  # Only runs when Juice Shop code changes AND juice-shop scan passed.
  # Full scan — Juice Shop has real attack surface, baseline misses too much.
  # continue-on-error: true — 100+ findings expected and intentional.
  # The point is demonstrating that the pipeline surfaces them, not blocks on them.
  dast-juice:
    name: DAST — ZAP (Juice Shop)
    needs: [juice-shop-scan, detect-changes]
    if: |
      needs.juice-shop-scan.result == 'success' &&
      needs.detect-changes.outputs.juice == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with: { name: juice-shop-image, path: /tmp }

      - name: Load Juice Shop image
        run: docker load -i /tmp/juice-shop.tar

      - name: Start Juice Shop staging app
        run: |
          docker run -d --name juice-staging \
            -p 3000:3000 \
            -e NODE_ENV=production \
            ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 && break
            echo "Waiting for Juice Shop... ($i/15)"
            sleep 5
          done

      - name: ZAP Full Scan — Juice Shop
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: http://localhost:3000
          cmd_options: -I
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker rm -f juice-staging || true

  # ── 9. Deploy — GitOps manifest update ───────────────────────────────────
  # Only runs when a new image was actually built (build.result == success).
  # Config-only changes (Kyverno, Terraform, values.yaml) skip deploy entirely —
  # ArgoCD picks those up directly from git without pipeline involvement.
  #
  # DAST gate logic:
  #   success = DAST ran and passed → safe to deploy
  #   skipped = DAST didn't run (no relevant code change) → safe to deploy
  #   failure = DAST ran and found issues → block deploy
  #
  # GitHub App token replaces GITOPS_PAT:
  #   PAT was long-lived, tied to human account, coarse permissions.
  #   App token is ephemeral (1hr), machine identity, contents:write only.
  deploy:
    name: Sync GitOps Manifests
    runs-on: ubuntu-latest
    needs: [dast-flask, dast-juice, build, iac-scan]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      needs.build.result == 'success' &&
      needs.iac-scan.result == 'success' &&
      (needs.dast-flask.result == 'success' || needs.dast-flask.result == 'skipped') &&
      (needs.dast-juice.result == 'success' || needs.dast-juice.result == 'skipped')
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Update All Overlays
        run: |
          git pull --rebase origin main

          # Flask — Pi overlay (ECR digest)
          PATCH_PI=gitops/manifests/flask-app/overlays/pi/patch-image.yaml
          ECR_URL="393818036545.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          ECR_DIGEST="${{ needs.build.outputs.ecr-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $ECR_URL@$ECR_DIGEST|" "$PATCH_PI"

          # Flask — GKE overlay (GAR digest)
          PATCH_GKE=gitops/manifests/flask-app/overlays/gke/patch-image.yaml
          GAR_URL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          GAR_DIGEST="${{ needs.build.outputs.gar-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $GAR_URL@$GAR_DIGEST|" "$PATCH_GKE"

          # Juice Shop — Pi overlay (ECR digest)
          # Scoped sed pattern matches only juice-shop image lines
          PATCH_JUICE=gitops/manifests/juice-shop/overlays/pi/patch-image.yaml
          JUICE_URL="393818036545.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.JUICE_SHOP_ECR_REPOSITORY }}"
          JUICE_DIGEST="${{ needs.build.outputs.juice-shop-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*juice-shop.*|\1image: $JUICE_URL@$JUICE_DIGEST|" "$PATCH_JUICE"

          git config user.name "devsecops-gitops-bot[bot]"
          git config user.email "devsecops-gitops-bot[bot]@users.noreply.github.com"
          git add "$PATCH_PI" "$PATCH_GKE" "$PATCH_JUICE"
          git commit -m "chore(gitops): deploy sha-${{ github.sha }} to all clusters [skip ci]" || exit 0

          # Retry push with rebase — handles concurrent pipeline runs
          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "Push failed, rebasing and retrying ($i/3)..."
            git pull --rebase origin main
          done
          exit 1