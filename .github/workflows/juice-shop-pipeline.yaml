name: Juice Shop DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devsecops-api
  CONTAINER_PORT: 5000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-pipeline-secure
  JUICE_SHOP_ECR_REPOSITORY: juice-shop
  GCP_REGION: me-west1
  GCP_GAR_REPOSITORY: devsecops-pipeline-secure

# Cancel in-progress runs on the same branch when a new push arrives.
# Prevents redundant builds queuing up — important when builds take 10+ minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  security-events: write
  issues: write

jobs:
  # ── 1. SAST — Bandit ──────────────────────────────────────────────────────
  # Runs on every push and PR — before build so we fail cheap.
  # Two-pass approach:
  #   Pass 1: Report all medium+ findings, upload as artifact (never blocks)
  #   Pass 2: Hard enforcement gate — fails pipeline on HIGH/CRITICAL only
  # This avoids the || true anti-pattern while not blocking on noise.
  sast:
    name: SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: pip install bandit[toml]==1.9.4

      # Pass 1: Full report — medium and above, JSON for artifact upload.
      # exit-zero here is intentional — this pass is for visibility, not enforcement.
      # The enforcement happens in Pass 2 below.
      - name: Bandit — Full Report (medium+)
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --exit-zero

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      # Pass 2: Enforcement gate — HIGH and CRITICAL only, no exit-zero.
      - name: Bandit — Enforcement Gate (high/critical)
        run: |
          bandit -r app/ \
            --severity-level high \
            --confidence-level medium \
            --format txt

  # ── 2. Secrets Scan — Trivy ───────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ── 3. Build & Push ──────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan]
    outputs:
      ecr-digest: ${{ steps.build-ecr.outputs.digest }}
      gar-digest: ${{ steps.build-gar.outputs.digest }}
      juice-shop-digest: ${{ steps.build-juice-shop.outputs.digest }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
      GCP_WORKLOAD_IDENTITY_POOL: ${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      # ── Flask — local build for scanning ─────────────────────────────────
      # amd64 only for scan — multi-arch push happens later after scan passes.
      - name: Build and export Flask image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load Flask image into Docker daemon
        run: docker load -i /tmp/image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/image.tar

      # ── Juice Shop — local build for scanning ─────────────────────────────
      - name: Build and export Juice Shop image
        uses: docker/build-push-action@v7
        with:
          context: ./juice-shop
          platforms: linux/amd64
          tags: ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/juice-shop.tar

      - name: Load Juice Shop image into Docker daemon
        run: docker load -i /tmp/juice-shop.tar

      - uses: actions/upload-artifact@v7
        with:
          name: juice-shop-image
          path: /tmp/juice-shop.tar

      # ── SBOMs ─────────────────────────────────────────────────────────────
      - name: Generate Flask SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./app.sbom.json

      - uses: actions/upload-artifact@v7
        with:
          name: final-sbom
          path: ./app.sbom.json

      - name: Generate Juice Shop SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: ./juice-shop.sbom.json

      - uses: actions/upload-artifact@v7
        with:
          name: juice-shop-sbom
          path: ./juice-shop.sbom.json

      # ── AWS — OIDC authentication ─────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── ECR push — Flask ──────────────────────────────────────────────────
      - name: Build and push Flask to ECR
        if: github.ref == 'refs/heads/main'
        id: build-ecr
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── ECR push — Juice Shop ─────────────────────────────────────────────
      - name: Build and push Juice Shop to ECR
        if: github.ref == 'refs/heads/main'
        id: build-juice-shop
        uses: docker/build-push-action@v7
        with:
          context: ./juice-shop
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GCP — OIDC authentication ─────────────────────────────────────────
      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_WORKLOAD_IDENTITY_POOL }}/providers/github-provider
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── GAR push — Flask ──────────────────────────────────────────────────
      - name: Build and push Flask to GCP
        if: github.ref == 'refs/heads/main' && env.GCP_PROJECT_NUMBER != '' && env.GCP_WORKLOAD_IDENTITY_POOL != '' && env.GCP_SERVICE_ACCOUNT != '' && env.GCP_PROJECT_ID != ''
        id: build-gar
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Cosign — sign all images by digest ────────────────────────────────
      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign all images by digest
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          ECR_REF: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build-ecr.outputs.digest }}
          GAR_REF: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}@${{ steps.build-gar.outputs.digest }}
          JUICE_REF: ${{ steps.ecr-login.outputs.registry }}/${{ env.JUICE_SHOP_ECR_REPOSITORY }}@${{ steps.build-juice-shop.outputs.digest }}
        run: |
          # Write key to disk only for the duration of signing, delete immediately after.
          # The key never exists on disk outside this block.
          echo "$COSIGN_PRIVATE_KEY" > cosign.key

          echo "Signing Flask ECR image..."
          cosign sign --key cosign.key "$ECR_REF"

          if [ -n "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "Signing Flask GAR image..."
            cosign sign --key cosign.key "$GAR_REF"
          fi

          echo "Signing Juice Shop ECR image..."
          cosign sign --key cosign.key "$JUICE_REF"

          rm -f cosign.key

  # ── 4. Container Scan — Flask ─────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy (Flask)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: { name: docker-image, path: /tmp }

      - name: Load Flask image
        run: docker load -i /tmp/image.tar

      # Pass 1: Visibility — full SARIF report to GitHub Security tab
      - name: Trivy — Full Report (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      # Pass 2: Enforcement — hard fail on fixable CRITICALs only
      - name: Trivy — Enforcement Gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: flask-app

      - name: Slack — Container Scan Passed
        if: success()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#36a64f",
                "title": "✅ Security Gate: Container Scan Passed",
                "text": "All security checks passed for *${{ env.IMAGE_NAME }}*.",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true }
                ]
              }]
            }

      - name: Slack — Container Scan Failed
        if: failure()
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [{
                "color": "#ff0000",
                "title": "🚫 Security Gate: Container Scan Failed",
                "text": "CRITICAL vulnerabilities detected in *${{ env.IMAGE_NAME }}*. Deployment halted.",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.workflow }}", "short": true }
                ]
              }]
            }

  # ── 5. Container Scan — Juice Shop ───────────────────────────────────────
  # Report only — no enforcement gate.
  # Juice Shop is a deliberately vulnerable application. It will always have
  # CRITICAL findings. That is the point. Enforcing here would permanently
  # break the pipeline for a known and accepted risk.
  # Findings are still surfaced in the GitHub Security tab under "juice-shop".
  juice-shop-scan:
    name: Container Scan — Trivy (Juice Shop)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: { name: juice-shop-image, path: /tmp }

      - name: Load Juice Shop image
        run: docker load -i /tmp/juice-shop.tar

      - name: Trivy — Juice Shop Report (SARIF, no enforcement)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          format: sarif
          output: trivy-juice-shop.sarif
          severity: HIGH,CRITICAL

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-juice-shop.sarif
          category: juice-shop

  # ── 6. IaC Scan — Checkov ────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          # soft_fail removed — this gate now enforces.
          # To accept a finding: add checkov:skip=CKV_ID:justification
          # in the relevant .tf file. Do not add soft_fail back.
          soft_fail: false
          output_format: cli

  # ── 7. DAST — OWASP ZAP ──────────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP
    needs: [container-scan, juice-shop-scan, iac-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── Flask DAST ────────────────────────────────────────────────────────
      # ZAP baseline scan — crawls the app and checks for common issues.
      # -I flag removed: ZAP now fails the pipeline on FAIL-level findings.
      # To accept a finding: add it to .zap/rules.tsv as WARN or IGNORE with comment.
      - uses: actions/download-artifact@v8
        with: { name: docker-image, path: /tmp }

      - name: Load Flask image
        run: docker load -i /tmp/image.tar

      - name: Start Flask staging app
        run: |
          docker run -d --name staging-app \
            -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Wait for app to be ready before ZAP starts scanning.
          # A fixed sleep is fragile — replace with a health check loop.
          for i in $(seq 1 10); do
            curl -sf http://localhost:${{ env.CONTAINER_PORT }}/health && break
            echo "Waiting for app... ($i/10)"
            sleep 3
          done

      - name: ZAP Baseline Scan — Flask App
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:${{ env.CONTAINER_PORT }}
          rules_file_name: .zap/rules.tsv
          # -I removed: ZAP now actually enforces FAIL-level rules.
          # cmd_options intentionally left minimal — let rules.tsv control behavior.

      # ── Juice Shop DAST ───────────────────────────────────────────────────
      # Full scan — Juice Shop has real attack surface, baseline would miss too much.
      # continue-on-error: true is correct here — 100+ findings are expected and
      # intentional. This is a deliberately vulnerable app used for to test the pipeline.
      # The SARIF report still surfaces in GitHub Security tab.
      - uses: actions/download-artifact@v8
        with: { name: juice-shop-image, path: /tmp }

      - name: Load Juice Shop image
        run: docker load -i /tmp/juice-shop.tar

      - name: Start Juice Shop staging app
        run: |
          docker run -d --name juice-staging \
            -p 3000:3000 \
            -e NODE_ENV=production \
            ${{ env.JUICE_SHOP_ECR_REPOSITORY }}:${{ github.sha }}
          # Node.js cold start is slower than Flask — wait for readiness.
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 && break
            echo "Waiting for Juice Shop... ($i/15)"
            sleep 5
          done

      - name: ZAP Full Scan — Juice Shop
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: http://localhost:3000
          cmd_options: -I
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker rm -f staging-app juice-staging || true

  # ── 8. Deploy — GitOps manifest update ───────────────────────────────────
  # Updates kustomize overlays with the new image digest.
  deploy:
    name: Sync GitOps Manifests
    runs-on: ubuntu-latest
    needs: [dast, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          # Use the ephemeral installation token, not the PAT
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0

      - name: Update All Overlays
        run: |
          git pull --rebase origin main

          PATCH_PI=gitops/manifests/flask-app/overlays/pi/patch-image.yaml
          ECR_URL="393818036545.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          ECR_DIGEST="${{ needs.build.outputs.ecr-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $ECR_URL@$ECR_DIGEST|" "$PATCH_PI"

          PATCH_GKE=gitops/manifests/flask-app/overlays/gke/patch-image.yaml
          GAR_URL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          GAR_DIGEST="${{ needs.build.outputs.gar-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*|\1image: $GAR_URL@$GAR_DIGEST|" "$PATCH_GKE"

          PATCH_JUICE=gitops/manifests/juice-shop/overlays/pi/patch-image.yaml
          JUICE_URL="393818036545.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.JUICE_SHOP_ECR_REPOSITORY }}"
          JUICE_DIGEST="${{ needs.build.outputs.juice-shop-digest }}"
          sed -i -E "s|^([[:space:]]*)image:.*juice-shop.*|\1image: $JUICE_URL@$JUICE_DIGEST|" "$PATCH_JUICE"

          git config user.name "devsecops-gitops-bot[bot]"
          git config user.email "devsecops-gitops-bot[bot]@users.noreply.github.com"
          git add "$PATCH_PI" "$PATCH_GKE" "$PATCH_JUICE"
          git commit -m "chore(gitops): deploy sha-${{ github.sha }} to all clusters [skip ci]" || exit 0

          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "Push failed, rebasing and retrying ($i/3)..."
            git pull --rebase origin main
          done
          exit 1