apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: devsecops-app

patches:
  - target:
      kind: Deployment
      name: devsecops-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: 393818036545.dkr.ecr.us-east-1.amazonaws.com/devsecops-pipeline-secure
    newTag: latest
