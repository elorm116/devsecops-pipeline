# gitops/apps-shared/kyverno-policies.yaml
#
# Separate Application for the policies themselves.
# Splitting install and policies is best practice — Kyverno CRDs must
# exist before policies can be applied. ArgoCD handles the ordering
# via sync waves if needed, but separate apps gives clearer visibility.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # sync after kyverno (wave 0)
spec:
  project: default
  source:
    repoURL: https://github.com/elorm116/devsecops-pipeline.git
    targetRevision: main
    path: gitops/manifests/kyverno/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true