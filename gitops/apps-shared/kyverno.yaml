apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Source 1: Kyverno Helm chart with inline values
    - chart: kyverno
      repoURL: https://kyverno.github.io/kyverno
      targetRevision: "3.*"
      helm:
        releaseName: kyverno
        valuesObject:
          admissionController:
            replicas: 1
            extraArgs:
              - --webhookTimeout=30
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 384Mi
          backgroundController:
            replicas: 1
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
          reportsController:
            replicas: 1
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
          cleanupController:
            replicas: 1
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
          webhookFailurePolicy: Ignore
          generateSuccessEvents: false
          config:
            resourceFilters:
              - "[Event,*,*]"
              - "[*,kube-system,*]"
              - "[*,kyverno,*]"
              - "[*,kube-public,*]"
              - "[*,local-path-storage,*]"
    # Source 2: Keep this for other references (policies, etc.)
    - repoURL: https://github.com/elorm116/devsecops-pipeline.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true