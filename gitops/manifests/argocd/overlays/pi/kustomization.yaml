apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # argocd-server runs in insecure mode because TLS is terminated
  # at the Cloudflare edge. Cloudflared tunnel connects directly to
  # argocd-server.argocd.svc.cluster.local:80 — no ingress controller needed.
  - target:
      kind: Deployment
      name: argocd-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--insecure"

  # repo-server had no resource limits — BestEffort QoS class means
  # it's first to be OOM killed under memory pressure.
  # Strategic merge patch handles existing empty resources field correctly.
  - target:
      kind: Deployment
      name: argocd-repo-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-repo-server
      spec:
        template:
          spec:
            containers:
              - name: repo-server
                resources:
                  requests:
                    memory: 128Mi
                    cpu: 50m
                  limits:
                    memory: 256Mi
                    cpu: 200m
