apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - backend-config.yaml
  - certificate.yaml

patches:
  - target:
      kind: Ingress
      name: argocd-server-ingress
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: gce
      - op: add
        path: /metadata/annotations/kubernetes.io~1ingress.class
        value: "gce"
      # FIX: Move these here to the Ingress target
      - op: replace
        path: /spec/rules/0/host
        value: argo.learndevops.site
      - op: replace
        path: /spec/rules/0/http/paths/0/backend/service/port/number
        value: 80
  - target:
      kind: Service
      name: argocd-server
    patch: |-
      - op: add
        path: /metadata/annotations/cloud.google.com~1backend-config
        value: '{"default": "argocd-server-backend-config"}'
      - op: add
        path: /metadata/annotations/networking.gke.io~1managed-certificates
        value: "argocd-server-cert"

  - target:
      kind: Deployment
      name: argocd-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--insecure"
        