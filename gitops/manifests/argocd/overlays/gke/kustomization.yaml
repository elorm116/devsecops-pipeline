apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - backend-config.yaml

patches:
  - target:
      kind: Ingress
      name: argocd-server-ingress
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: gce
      # ADD THIS: GKE often needs the legacy annotation to trigger the controller
      - op: add
        path: /metadata/annotations/kubernetes.io~1ingress.class
        value: "gce"
  - target:
      kind: Service
      name: argocd-server
    patch: |-
      - op: add
        path: /metadata/annotations/cloud.google.com~1backend-config
        value: '{"default": "argocd-server-backend-config"}'