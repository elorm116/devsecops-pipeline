apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
spec:
  template:
    spec:
      containers:
        - name: api
          # Startup: Holds off Liveness/Readiness until the app is fully booted
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 15  # Pi might be slow, give it 15 attempts
            periodSeconds: 5      # 15 * 5 = 75 seconds total to start
          # Liveness: Restarts the container if it freezes
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            timeoutSeconds: 5
          # Readiness: Tells the Service/Tunnel it's okay to send traffic
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            timeoutSeconds: 5