apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
spec:
  template:
    spec:
      securityContext:
        # Satisfies: require-non-root
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: api
          securityContext:
            # Satisfies: require-readonly-filesystem
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Your existing probe config
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            timeoutSeconds: 5
            