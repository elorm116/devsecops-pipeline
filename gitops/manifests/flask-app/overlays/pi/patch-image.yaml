apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-api
    spec:
      containers:
        - name: api
          image: 393818036545.dkr.ecr.us-east-1.amazonaws.com/devsecops-pipeline-secure@sha256:6491d0aa428144b719aba3e240d5074c448287003d76c94c3b3b798f6f474856
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]