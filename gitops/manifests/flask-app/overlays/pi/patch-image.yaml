# gitops/manifests/flask-app/overlays/pi/patch-image.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-api
    spec:
      containers:
        - name: api
          image: 393818036545.dkr.ecr.us-east-1.amazonaws.com/devsecops-pipeline-secure@sha256:97319718e6e2a08075ff722a1b5e38f6c913e8be5675d874d30ad547bcbf5c33
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]