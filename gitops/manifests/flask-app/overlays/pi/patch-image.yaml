# gitops/manifests/flask-app/overlays/pi/patch-image.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-api
    spec:
      containers:
        - name: api
          image: 393818036545.dkr.ecr.us-east-1.amazonaws.com/devsecops-pipeline-secure@sha256:a5a887d3bf009e0561750f5f2a104a766d063707e13c2b3acf66e610f58a9f84
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]