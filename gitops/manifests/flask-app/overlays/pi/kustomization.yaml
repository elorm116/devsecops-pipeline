# gitops/manifests/flask-app/overlays/pi/kustomization.yaml
#
# Pi-specific overlay. References the base and applies patches.
# The pipeline ONLY touches patch-image.yaml — nothing else changes.
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devsecops-app

resources:
  - ../../base                  # pull in all base manifests

patches:
  - path: patch-image.yaml      # pipeline updates image tag here
  - path: patch-replicas.yaml   # Pi-specific replica count

# Pi-specific labels added to every resource
commonLabels:
  environment: pi-homelab