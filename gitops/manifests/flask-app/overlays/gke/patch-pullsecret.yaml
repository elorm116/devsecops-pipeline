# gitops/manifests/flask-app/overlays/gke/patch-pullsecret.yaml
#
# GKE pulls from Artifact Registry using GCP-native auth (no imagePullSecrets).
# Ensure the base Deployment's ECR pull secret is not required on GKE.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
spec:
  template:
    spec:
      imagePullSecrets: []
