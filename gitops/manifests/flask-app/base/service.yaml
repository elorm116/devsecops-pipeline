# gitops/manifests/flask-app/base/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: devsecops-api
  labels:
    app.kubernetes.io/name: devsecops-api
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: devsecops-api
  ports:
    - name: http
      port: 80
      targetPort: 5000           # references named port in deployment
      protocol: TCP
  type: ClusterIP