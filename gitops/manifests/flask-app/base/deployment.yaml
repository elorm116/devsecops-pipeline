# gitops/manifests/flask-app/base/deployment.yaml
#
# Base manifest — image tag is a placeholder.
# The overlay/pi/patch-image.yaml sets the real tag.
# The pipeline updates that patch file on every successful build.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
  namespace: devsecops-app
  labels:
    app.kubernetes.io/name: devsecops-api
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime rolling deploys
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault    # restrict syscalls — best practice 2026
      containers:
        - name: api
          image: 393818036545.dkr.ecr.us-east-1.amazonaws.com/devsecops-pipeline-secure:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: APP_ENV
              value: production
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true   # container can't write to its own fs
            capabilities:
              drop: ["ALL"]               # drop all Linux capabilities
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:                   # gives slow-starting containers time to boot
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5
      imagePullSecrets:
        - name: ecr-secret
      topologySpreadConstraints:         # spread pods across nodes if you add a 2nd Pi
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: devsecops-api