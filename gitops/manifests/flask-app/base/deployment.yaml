# gitops/manifests/flask-app/base/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-api
  labels:
    app.kubernetes.io/name: devsecops-api
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1          # Allow one pod to drop during surge to save RAM/CPU on the Pi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: 393818036545.dkr.ecr.us-east-1.amazonaws.com/devsecops-pipeline-secure:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: APP_ENV
              value: production
          resources:
            requests:
              memory: 128Mi      # Bumped: Avoid immediate thrashing
              cpu: 100m          # Bumped: Give K3s more cycles for TLS/Handshakes
            limits:
              memory: 512Mi      # Bumped: Flask-Limiter + Python 3.12 overhead
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # RELAXED PROBES: Prevents "Context Deadline Exceeded" on slow hardware
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 24 # 2 minutes total (24 * 5s)
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30    # Check less often to reduce CPU overhead
            timeoutSeconds: 5     # Essential: Don't kill pod if Pi is just "busy"
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5     # Essential: Avoid 502s during minor spikes
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
      imagePullSecrets:
        - name: ecr-secret
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway # Change to "ScheduleAnyway" if only 1 node exists
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: devsecops-api