# gitops/manifests/juice-shop/overlays/pi/kustomization.yaml
#
# Pi-specific overlay for Juice Shop.
# Single replica, reduced resources vs what a cloud deployment would use.
# Pipeline updates patch-image.yaml digest on every successful build.
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: juice-shop

resources:
  - ../../base

patches:
  - path: patch-image.yaml          # Pipeline writes @sha256 digest here
  - path: patch-replicas.yaml       # Pi: 1 replica to save RAM

commonLabels:
  environment: pi-homelab