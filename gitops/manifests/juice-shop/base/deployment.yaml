# gitops/manifests/juice-shop/base/deployment.yaml
#
# OWASP Juice Shop — intentionally vulnerable Node.js application.
#
# SECURITY POSTURE (intentional relaxations documented):
# -------------------------------------------------------
# 1. runAsUser: 1000 — We rebuild the image to run as non-root.
#    The official image runs as root (UID 0), which our require-non-root
#    ClusterPolicy would block. Our custom image fixes this.
#
# 2. readOnlyRootFilesystem: false — Juice Shop writes session data,
#    SQLite DB, and logs to its own filesystem at runtime. Unlike our
#    Flask app which uses explicit emptyDir mounts, Juice Shop's
#    internal Express/SQLite stack expects a writable FS.
#    A Kyverno policy exception is scoped to this namespace only.
#
# 3. imagePullSecrets: regcred — rotated every 6h by kyverno-ecr-refresher
#    CronJob which now covers both kyverno and juice-shop namespaces.
#
# WHY THIS IS VALUABLE FOR DEVSECOPS DEMONSTRATION:
# --------------------------------------------------
# - SAST (Bandit equiv for JS: njsscan) will find real vulns in source
# - DAST (ZAP) will discover 100+ OWASP Top 10 findings
# - Trivy will surface CVEs in the npm dependency tree
# - Kyverno blocks the ROOT version — only our hardened image deploys
# - This proves the pipeline enforces security, not just reports it
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  labels:
    app.kubernetes.io/name: juice-shop
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: juice-shop
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juice-shop
      annotations:
        security.devsecops/dast-target: "true"
        security.devsecops/scan-url: "http://juice-shop.juice-shop.svc.cluster.local:3000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: juice-shop
          image: 393818036545.dkr.ecr.us-east-1.amazonaws.com/juice-shop:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: CTF_KEY
              value: ""
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: juice-shop-data
              mountPath: /juice-shop/data/chatbot  # ← scoped to chatbot only
                                                   # data/static remains intact
                                                   # from image layer
          startupProbe:
            httpGet:
              path: /rest/admin/application-version
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /rest/admin/application-version
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /rest/admin/application-version
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: juice-shop-data
          emptyDir:
            sizeLimit: 256Mi        # ← mountPath removed from here
      imagePullSecrets:
        - name: regcred             # Rotated every 6h by kyverno-ecr-refresher