# Traefik values for Pi homelab.
# NodePort so Cloudflare Tunnel can reach it without a LoadBalancer.

service:
  type: NodePort
  ports:
    web:
      nodePort: 30080
    websecure:
      nodePort: 30443

ports:
  web:
    port: 8000
    expose: true
    exposedPort: 80
  websecure:
    port: 8443
    expose: true
    exposedPort: 443
  metrics:
    port: 9100
    expose: true
    exposedPort: 9100

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 300m

logs:
  access:
    enabled: true

api:
  dashboard: true
  insecure: true

metrics:
  prometheus:
    enabled: true
    entryPoint: metrics