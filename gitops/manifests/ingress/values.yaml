# gitops/manifests/ingress/values.yaml
#
# Traefik values for Pi homelab.
# NodePort so Cloudflare Tunnel can reach it without a LoadBalancer.
#

service:
  type: NodePort

ports:
  web:
    nodePort: 30080
  websecure:
    nodePort: 30443
  # Merged Metrics port here
  metrics:
    port: 9100
    expose: true

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 300m

# Access logs — useful for seeing what ZAP and Cloudflare are hitting
logs:
    access:
      enabled: true

# Dashboard — ClusterIP only, access via port-forward
api:
  dashboard: true
  insecure: true

# Metrics — Enable Prometheus exporter
metrics:
  prometheus:
    enabled: true
    entryPoint: metrics