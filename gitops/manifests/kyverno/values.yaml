# gitops/manifests/kyverno/values.yaml
#
# Kyverno 1.17 tuned for Raspberry Pi (lightweight) + GKE Autopilot
#

admissionController:
  replicas: 1                     # Good for single-node Pi
  webhookTimeout: 30              # ✅ Still valid in 1.17 (seconds)

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

backgroundController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

reportsController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

cleanupController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Important for homelab / learning
webhookFailurePolicy: Ignore      # Prevents lockout if Kyverno restarts

# Reduce noise
generateSuccessEvents: false

# Optional but recommended for Pi
config:
  resourceFilters:                # Skip high-volume system resources
    - "[Event,*,*]"
    - "[*,kube-system,*]"
    - "[*,kyverno,*]"
    - "[*,kube-public,*]"
    - "[*,local-path-storage,*]"
    