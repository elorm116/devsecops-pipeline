# gitops/manifests/kyverno/values.yaml
#
# Kyverno tuned for Raspberry Pi (lightweight)

admissionController:
  replicas: 1
  container:
    extraArgs:
      webhookTimeout: "30"    # must be a string, not integer
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

backgroundController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

reportsController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

cleanupController:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

webhookFailurePolicy: Ignore
generateSuccessEvents: false

config:
  resourceFilters:
    - "[Event,*,*]"
    - "[*,kube-system,*]"
    - "[*,kyverno,*]"
    - "[*,kube-public,*]"
    - "[*,local-path-storage,*]"
    