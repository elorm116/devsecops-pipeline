apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: kyverno
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-token-refresher
  namespace: kyverno
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete", "patch"] # Added delete for your script's logic
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresher
  namespace: kyverno
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresher
    namespace: kyverno
roleRef:
  kind: Role
  name: ecr-token-refresher
  apiGroup: rbac.authorization.k8s.io