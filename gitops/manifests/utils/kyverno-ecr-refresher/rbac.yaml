# gitops/manifests/utils/kyverno-ecr-refresher/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: kyverno
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ecr-token-refresher
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ecr-token-refresher
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresher
    namespace: kyverno
roleRef:
  kind: ClusterRole
  name: ecr-token-refresher
  apiGroup: rbac.authorization.k8s.io
  