apiVersion: batch/v1
kind: CronJob
metadata:
  name: kyverno-ecr-token-refresher
  namespace: kyverno
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresher
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: ecr-token-refresher
            image: public.ecr.aws/aws-cli/aws-cli:2.17.0
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -euo pipefail
                echo "🔄 Installing kubectl for ARM64..."
                curl -L "https://dl.k8s.io/release/v1.30.0/bin/linux/arm64/kubectl" -o /tmp/kubectl
                chmod +x /tmp/kubectl

                echo "🔄 Refreshing ECR token for Kyverno..."
                TOKEN=$(aws ecr get-login-password --region us-east-1)

                echo "🗑️ Deleting old secret..."
                /tmp/kubectl delete secret regcred -n kyverno --ignore-not-found=true

                echo "🔑 Creating new docker secret 'regcred' in kyverno namespace..."
                /tmp/kubectl create secret docker-registry regcred \
                  --docker-server=393818036545.dkr.ecr.us-east-1.amazonaws.com \
                  --docker-username=AWS \
                  --docker-password="$TOKEN" \
                  -n kyverno

                echo "✅ Kyverno ECR token refreshed successfully!"
            env:
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: aws-ecr-creds
                    key: AWS_ACCESS_KEY_ID
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: aws-ecr-creds
                    key: AWS_SECRET_ACCESS_KEY
              - name: AWS_DEFAULT_REGION
                value: us-east-1
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop: ["ALL"]
            volumeMounts:
              - name: tmp
                mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}