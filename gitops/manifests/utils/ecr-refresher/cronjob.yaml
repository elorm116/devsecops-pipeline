apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresher
  namespace: devsecops-app
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresher-sa
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: ecr-token-refresher
            image: public.ecr.aws/aws-cli/aws-cli:2.17.0
            command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              echo "🔄 Installing kubectl for ARM64..."
              curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/arm64/kubectl"
              mv ./kubectl /tmp/kubectl
              chmod +x /tmp/kubectl

              echo "🔄 Refreshing ECR token..."
              TOKEN=$(aws ecr get-login-password --region us-east-1)

              echo "🗑️ Deleting old secret..."
              /tmp/kubectl delete secret ecr-secret -n devsecops-app --ignore-not-found=true

              echo "🔑 Creating new docker secret..."
              /tmp/kubectl create secret docker-registry ecr-secret \
                --docker-server=393818036545.dkr.ecr.us-east-1.amazonaws.com \
                --docker-username=AWS \
                --docker-password="$TOKEN" \
                -n devsecops-app

              echo "✅ ECR token refreshed successfully!"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            volumeMounts:
              - name: tmp
                mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}