apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: kube-system
  labels:
    app: cloudflared
    component: networking
spec:
  replicas: 1
  # Strategy ensures the old tunnel disconnects before the new one starts
  # to avoid "Already active" errors from Cloudflare.
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.3.0
        args:
        - tunnel
        - --config
        - /etc/cloudflared/config/config.yaml
        - --no-autoupdate
        - --metrics
        - 0.0.0.0:2000
        - run
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN
        volumeMounts:
          - name: config
            mountPath: /etc/cloudflared/config
            readOnly: true
        # --- FIX: Moved these out of the volumeMounts/volumes block ---
        ports:
        - name: metrics
          containerPort: 2000
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 150m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /ready
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      volumes:
        - name: config
          configMap:
            name: cloudflared-config