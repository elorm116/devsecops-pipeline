apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: kube-system
  labels:
    app: cloudflared
    component: networking
spec:
  replicas: 1
  # Strategy ensures the old tunnel disconnects before the new one starts
  # to avoid "Already active" errors from Cloudflare.
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.3.0 # Updated to a 2026 stable release
        args:
        - tunnel
        - --no-autoupdate
        - --metrics
        - 0.0.0.0:2000 # Required to make your probes work
        - run
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN
        ports:
        - name: metrics
          containerPort: 2000
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 150m # Slightly tightened for Pi resource management
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /ready # cloudflared uses /ready for the health check endpoint
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL