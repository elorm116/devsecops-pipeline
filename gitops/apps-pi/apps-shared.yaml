# gitops/apps-pi/apps-shared.yaml
#
# Nested App-of-Apps: installs the shared ArgoCD Applications (ingress,
# monitoring, Kyverno, policies) that live under gitops/apps-shared/.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-shared
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/elorm116/devsecops-pipeline.git
    targetRevision: main
    path: gitops/apps-shared
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true