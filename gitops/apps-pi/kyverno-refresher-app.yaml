apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-ecr-refresher
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/elorm116/devsecops-pipeline.git
    targetRevision: main
    path: gitops/manifests/utils/kyverno-ecr-refresher # Pointing to the NEW folder
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true