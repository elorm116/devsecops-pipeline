# gitops/apps-pi/shared-apps.yaml
#
# ArgoCD networking for the Pi cluster (Ingress + server flags).
# This is intentionally separate from the shared applications in gitops/apps-shared/.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pi-infra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/elorm116/devsecops-pipeline.git
    targetRevision: main
    path: gitops/manifests/argocd/overlays/pi
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
