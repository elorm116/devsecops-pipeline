# gitops/apps-pi/app-of-apps.yaml
#
# The "App of Apps" pattern — one root ArgoCD Application that manages
# all other Applications. You apply this ONE file manually, once.
# After that, ArgoCD manages itself and everything else from Git.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  # Finalizer ensures child apps are deleted when this is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/elorm116/devsecops-pipeline.git
    targetRevision: main
    path: gitops/apps-pi       # ArgoCD watches this folder for Application manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true              # delete resources removed from Git
      selfHeal: true           # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true